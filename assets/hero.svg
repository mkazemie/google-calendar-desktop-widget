<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" font-family="Segoe UI, Arial, sans-serif">
  <!-- desktop wallpaper -->
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a6c"/>
      <stop offset="0.55" stop-color="#2d1e5f"/>
      <stop offset="1" stop-color="#0f3057"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4facfe" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#9d50bb" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="640" fill="url(#wall)"/>
  <circle cx="240" cy="180" r="190" fill="url(#glow)"/>
  <circle cx="480" cy="460" r="150" fill="url(#glow)" opacity="0.7"/>
  <circle cx="120" cy="520" r="90" fill="#4facfe" opacity="0.12"/>

  <!-- desktop icons (visible THROUGH the widget) -->
  <g opacity="0.9">
    <rect x="60" y="60" width="52" height="52" rx="10" fill="#ffffff" opacity="0.16"/>
    <rect x="60" y="150" width="52" height="52" rx="10" fill="#ffffff" opacity="0.16"/>
    <rect x="60" y="240" width="52" height="52" rx="10" fill="#ffffff" opacity="0.16"/>
    <text x="86" y="132" fill="#ffffff" opacity="0.55" font-size="11" text-anchor="middle">Projects</text>
    <text x="86" y="222" fill="#ffffff" opacity="0.55" font-size="11" text-anchor="middle">Photos</text>
    <text x="86" y="312" fill="#ffffff" opacity="0.55" font-size="11" text-anchor="middle">Notes</text>
  </g>

  <!-- the widget: translucent calendar pinned to the desktop -->
  <g>
    <!-- window shadow -->
    <rect x="628" y="52" width="500" height="500" rx="14" fill="#000000" opacity="0.30"/>
    <!-- title bar -->
    <rect x="620" y="44" width="500" height="36" rx="10" fill="#202124" opacity="0.96"/>
    <rect x="620" y="66" width="500" height="14" fill="#202124" opacity="0.96"/>
    <rect x="634" y="54" width="16" height="16" rx="4" fill="#1a73e8"/>
    <rect x="637" y="57" width="10" height="3" rx="1" fill="#ffffff"/>
    <rect x="637" y="62" width="10" height="6" rx="1" fill="#ffffff" opacity="0.85"/>
    <text x="660" y="67" fill="#e8eaed" font-size="13">Google Calendar</text>
    <!-- bar buttons: mouse (active blue) + menu -->
    <circle cx="1042" cy="62" r="3.5" fill="#8ab4f8"/>
    <path d="M1038 56 q4 -4 8 0" stroke="#8ab4f8" stroke-width="1.6" fill="none"/>
    <g stroke="#e8eaed" stroke-width="1.8" opacity="0.9">
      <line x1="1078" y1="57" x2="1096" y2="57"/>
      <line x1="1078" y1="62" x2="1096" y2="62"/>
      <line x1="1078" y1="67" x2="1096" y2="67"/>
    </g>

    <!-- calendar body: translucent so the wallpaper shows through -->
    <rect x="620" y="80" width="500" height="464" fill="#ffffff" opacity="0.80"/>
    <!-- weekday header -->
    <g fill="#5f6368" font-size="12" text-anchor="middle">
      <text x="688" y="106">MON</text><text x="788" y="106">TUE</text>
      <text x="888" y="106">WED</text><text x="988" y="106">THU</text>
      <text x="1078" y="106">FRI</text>
    </g>
    <g fill="#202124" font-size="20" text-anchor="middle" font-weight="600">
      <text x="688" y="132">14</text><text x="788" y="132">15</text>
      <text x="888" y="132">16</text><text x="988" y="132">17</text>
      <text x="1078" y="132">18</text>
    </g>
    <circle cx="888" cy="125" r="17" fill="#1a73e8" opacity="0.95"/>
    <text x="888" y="132" fill="#ffffff" font-size="20" text-anchor="middle" font-weight="600">16</text>

    <!-- grid lines -->
    <g stroke="#dadce0" stroke-width="1" opacity="0.8">
      <line x1="620" y1="148" x2="1120" y2="148"/>
      <line x1="620" y1="212" x2="1120" y2="212"/>
      <line x1="620" y1="276" x2="1120" y2="276"/>
      <line x1="620" y1="340" x2="1120" y2="340"/>
      <line x1="620" y1="404" x2="1120" y2="404"/>
      <line x1="620" y1="468" x2="1120" y2="468"/>
      <line x1="738" y1="148" x2="738" y2="544"/>
      <line x1="838" y1="148" x2="838" y2="544"/>
      <line x1="938" y1="148" x2="938" y2="544"/>
      <line x1="1038" y1="148" x2="1038" y2="544"/>
    </g>

    <!-- events -->
    <rect x="644" y="156" width="88" height="46" rx="6" fill="#1a73e8" opacity="0.92"/>
    <text x="652" y="174" fill="#ffffff" font-size="11">Team sync</text>
    <text x="652" y="188" fill="#ffffff" font-size="10" opacity="0.8">9:00 – 9:45</text>

    <rect x="744" y="220" width="88" height="78" rx="6" fill="#0b8043" opacity="0.92"/>
    <text x="752" y="238" fill="#ffffff" font-size="11">Deep work</text>
    <text x="752" y="252" fill="#ffffff" font-size="10" opacity="0.8">10:00 – 12:00</text>

    <rect x="844" y="284" width="88" height="46" rx="6" fill="#f4511e" opacity="0.92"/>
    <text x="852" y="302" fill="#ffffff" font-size="11">Lunch w/ Sara</text>
    <text x="852" y="316" fill="#ffffff" font-size="10" opacity="0.8">12:30 – 13:15</text>

    <rect x="944" y="188" width="88" height="60" rx="6" fill="#8e24aa" opacity="0.92"/>
    <text x="952" y="206" fill="#ffffff" font-size="11">Design review</text>
    <text x="952" y="220" fill="#ffffff" font-size="10" opacity="0.8">9:30 – 11:00</text>

    <rect x="1044" y="348" width="70" height="46" rx="6" fill="#f6bf26" opacity="0.95"/>
    <text x="1052" y="366" fill="#3c4043" font-size="11">Gym</text>
    <text x="1052" y="380" fill="#3c4043" font-size="10" opacity="0.8">17:00</text>

    <!-- "now" line -->
    <line x1="838" y1="344" x2="938" y2="344" stroke="#ea4335" stroke-width="2.5"/>
    <circle cx="838" cy="344" r="5" fill="#ea4335"/>
  </g>

  <!-- cursor clicking a desktop icon THROUGH the widget -->
  <g>
    <circle cx="700" cy="452" r="16" fill="#ffffff" opacity="0.18"/>
    <circle cx="700" cy="452" r="26" fill="none" stroke="#ffffff" opacity="0.25" stroke-width="2"/>
    <path d="M694 440 l0 22 6 -6 4 10 5 -2 -4 -10 8 0 z" fill="#ffffff" stroke="#3c4043" stroke-width="1.4"/>
  </g>
  <g>
    <rect x="560" y="580" width="330" height="34" rx="17" fill="#202124" opacity="0.92"/>
    <text x="725" y="602" fill="#e8eaed" font-size="14" text-anchor="middle">Your clicks pass straight through to the desktop</text>
  </g>

  <!-- taskbar -->
  <rect x="0" y="616" width="1200" height="24" fill="#101418" opacity="0.92"/>
  <g fill="#ffffff" opacity="0.5">
    <rect x="562" y="622" width="12" height="12" rx="3"/>
    <rect x="586" y="622" width="12" height="12" rx="3"/>
    <rect x="610" y="622" width="12" height="12" rx="3"/>
    <rect x="634" y="622" width="12" height="12" rx="3"/>
  </g>
  <text x="1160" y="631" fill="#ffffff" opacity="0.6" font-size="10" text-anchor="middle">12:34</text>
</svg>
