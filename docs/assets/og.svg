<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a6c"/>
      <stop offset="0.55" stop-color="#2d1e5f"/>
      <stop offset="1" stop-color="#0f3057"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4facfe" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#9d50bb" stop-opacity="0.22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="220" cy="140" r="200" fill="url(#glow)"/>
  <circle cx="380" cy="520" r="150" fill="url(#glow)" opacity="0.7"/>

  <!-- logo -->
  <g transform="translate(80,120)">
    <rect width="84" height="84" rx="18" fill="#1a73e8"/>
    <rect x="14" y="20" width="56" height="46" fill="#ffffff"/>
    <rect x="14" y="20" width="56" height="14" fill="#174ea6"/>
    <g fill="#1a73e8">
      <rect x="24" y="42" width="7" height="7"/><rect x="38" y="42" width="7" height="7"/><rect x="52" y="42" width="7" height="7"/>
      <rect x="24" y="54" width="7" height="7"/><rect x="38" y="54" width="7" height="7"/><rect x="52" y="54" width="7" height="7"/>
    </g>
  </g>

  <text x="80" y="290" fill="#ffffff" font-size="52" font-weight="700">Google Calendar</text>
  <text x="80" y="350" fill="#ffffff" font-size="52" font-weight="700">Desktop Widget</text>
  <text x="80" y="404" fill="#c8d0e0" font-size="24">Transparent · Click-through · Live on your desktop</text>
  <rect x="80" y="440" width="260" height="54" rx="27" fill="#1a73e8"/>
  <text x="210" y="474" fill="#ffffff" font-size="21" font-weight="600" text-anchor="middle">Free for Windows</text>

  <!-- mini widget mock -->
  <g transform="translate(700,90)">
    <rect x="8" y="8" width="420" height="440" rx="14" fill="#000000" opacity="0.3"/>
    <rect x="0" y="0" width="420" height="30" rx="10" fill="#202124"/>
    <rect x="0" y="18" width="420" height="12" fill="#202124"/>
    <rect x="12" y="8" width="14" height="14" rx="3" fill="#1a73e8"/>
    <text x="34" y="20" fill="#e8eaed" font-size="12">Google Calendar Desktop Widget</text>
    <rect x="0" y="30" width="420" height="410" fill="#ffffff" opacity="0.82"/>
    <g stroke="#dadce0" stroke-width="1" opacity="0.9">
      <line x1="0" y1="90" x2="420" y2="90"/><line x1="0" y1="160" x2="420" y2="160"/>
      <line x1="0" y1="230" x2="420" y2="230"/><line x1="0" y1="300" x2="420" y2="300"/><line x1="0" y1="370" x2="420" y2="370"/>
      <line x1="105" y1="30" x2="105" y2="440"/><line x1="210" y1="30" x2="210" y2="440"/><line x1="315" y1="30" x2="315" y2="440"/>
    </g>
    <g fill="#5f6368" font-size="11" text-anchor="middle">
      <text x="52" y="52">MON</text><text x="157" y="52">TUE</text><text x="262" y="52">WED</text><text x="367" y="52">THU</text>
    </g>
    <circle cx="262" cy="70" r="14" fill="#1a73e8"/>
    <text x="262" y="75" fill="#ffffff" font-size="15" text-anchor="middle" font-weight="600">16</text>
    <g fill="#202124" font-size="15" text-anchor="middle" font-weight="600">
      <text x="52" y="75">14</text><text x="157" y="75">15</text><text x="367" y="75">17</text>
    </g>
    <rect x="12" y="100" width="82" height="40" rx="6" fill="#1a73e8" opacity="0.92"/>
    <rect x="117" y="170" width="82" height="52" rx="6" fill="#0b8043" opacity="0.92"/>
    <rect x="222" y="240" width="82" height="40" rx="6" fill="#f4511e" opacity="0.92"/>
    <rect x="327" y="130" width="82" height="52" rx="6" fill="#8e24aa" opacity="0.92"/>
    <rect x="222" y="330" width="82" height="40" rx="6" fill="#f6bf26" opacity="0.95"/>
    <line x1="210" y1="310" x2="315" y2="310" stroke="#ea4335" stroke-width="2.5"/>
    <circle cx="210" cy="310" r="5" fill="#ea4335"/>
    <!-- cursor passing through -->
    <circle cx="150" cy="390" r="15" fill="#ffffff" opacity="0.25"/>
    <path d="M144 378 l0 21 5.5 -5.5 3.7 9.4 4.6 -2 -3.7 -9.4 7.4 0 z" fill="#ffffff" stroke="#3c4043" stroke-width="1.4"/>
  </g>
</svg>
