<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a6c"/><stop offset="1" stop-color="#0f3057"/>
    </linearGradient>
  </defs>

  <!-- ============ left card: widget mode ============ -->
  <g>
    <rect x="20" y="20" width="560" height="360" rx="16" fill="url(#bg1)"/>
    <text x="300" y="58" fill="#ffffff" font-size="20" font-weight="600" text-anchor="middle">Widget mode</text>
    <text x="300" y="80" fill="#c8d0e0" font-size="13" text-anchor="middle">Ghosted on your desktop · clicks pass through · pinned under every window</text>

    <!-- ghost calendar -->
    <rect x="120" y="104" width="360" height="26" rx="8" fill="#202124" opacity="0.9"/>
    <circle cx="446" cy="117" r="3" fill="#8ab4f8"/>
    <path d="M442 112 q4 -3.6 8 0" stroke="#8ab4f8" stroke-width="1.4" fill="none"/>
    <g stroke="#e8eaed" stroke-width="1.5" opacity="0.9">
      <line x1="460" y1="113" x2="472" y2="113"/><line x1="460" y1="117" x2="472" y2="117"/><line x1="460" y1="121" x2="472" y2="121"/>
    </g>
    <text x="134" y="121" fill="#e8eaed" font-size="11">Google Calendar</text>
    <rect x="120" y="130" width="360" height="210" fill="#ffffff" opacity="0.35"/>
    <g stroke="#ffffff" stroke-width="1" opacity="0.25">
      <line x1="120" y1="180" x2="480" y2="180"/><line x1="120" y1="230" x2="480" y2="230"/><line x1="120" y1="280" x2="480" y2="280"/>
      <line x1="210" y1="130" x2="210" y2="340"/><line x1="300" y1="130" x2="300" y2="340"/><line x1="390" y1="130" x2="390" y2="340"/>
    </g>
    <rect x="132" y="146" width="66" height="30" rx="5" fill="#1a73e8" opacity="0.55"/>
    <rect x="222" y="196" width="66" height="44" rx="5" fill="#0b8043" opacity="0.55"/>
    <rect x="312" y="246" width="66" height="30" rx="5" fill="#f4511e" opacity="0.55"/>

    <!-- cursor + pass-through ripple -->
    <circle cx="340" cy="300" r="14" fill="#ffffff" opacity="0.2"/>
    <circle cx="340" cy="300" r="24" fill="none" stroke="#ffffff" opacity="0.3" stroke-width="2"/>
    <path d="M334 288 l0 20 5.5 -5.5 3.5 9 4.5 -2 -3.5 -9 7 0 z" fill="#ffffff" stroke="#3c4043" stroke-width="1.3"/>
    <text x="300" y="366" fill="#c8d0e0" font-size="12" text-anchor="middle">Work, click, and drag on anything — the calendar never gets in the way</text>
  </g>

  <!-- ============ right card: interactive mode ============ -->
  <g>
    <rect x="620" y="20" width="560" height="360" rx="16" fill="#17181c"/>
    <text x="900" y="58" fill="#ffffff" font-size="20" font-weight="600" text-anchor="middle">Interactive mode</text>
    <text x="900" y="80" fill="#9aa0a6" font-size="13" text-anchor="middle">One click · full Google Calendar · add and edit events, then toggle back</text>

    <!-- solid calendar window -->
    <rect x="726" y="106" width="352" height="240" rx="10" fill="#000000" opacity="0.45"/>
    <rect x="720" y="100" width="352" height="26" rx="8" fill="#202124"/>
    <path d="M1006 108 q4 -3.6 8 0" stroke="#e8eaed" stroke-width="1.4" fill="none"/>
    <circle cx="1010" cy="113" r="3" fill="#e8eaed"/>
    <g stroke="#e8eaed" stroke-width="1.5">
      <line x1="1026" y1="109" x2="1038" y2="109"/><line x1="1026" y1="113" x2="1038" y2="113"/><line x1="1026" y1="117" x2="1038" y2="117"/>
    </g>
    <g stroke="#f28b82" stroke-width="1.6">
      <line x1="1052" y1="108" x2="1062" y2="118"/><line x1="1062" y1="108" x2="1052" y2="118"/>
    </g>
    <text x="734" y="117" fill="#e8eaed" font-size="11">Google Calendar</text>
    <rect x="720" y="126" width="352" height="210" fill="#ffffff"/>
    <g stroke="#dadce0" stroke-width="1">
      <line x1="720" y1="176" x2="1072" y2="176"/><line x1="720" y1="226" x2="1072" y2="226"/><line x1="720" y1="276" x2="1072" y2="276"/>
      <line x1="808" y1="126" x2="808" y2="336"/><line x1="896" y1="126" x2="896" y2="336"/><line x1="984" y1="126" x2="984" y2="336"/>
    </g>
    <rect x="730" y="140" width="66" height="30" rx="5" fill="#1a73e8"/>
    <rect x="818" y="190" width="66" height="44" rx="5" fill="#0b8043"/>
    <rect x="906" y="240" width="66" height="30" rx="5" fill="#f4511e"/>
    <!-- event being created -->
    <rect x="994" y="150" width="66" height="40" rx="5" fill="#8e24aa" opacity="0.9" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="1002" y="168" fill="#ffffff" font-size="10">New event…</text>
    <path d="M1046 182 l0 18 5 -5 3 8 4 -1.8 -3 -8 6.5 0 z" fill="#ffffff" stroke="#3c4043" stroke-width="1.2"/>
    <text x="900" y="366" fill="#9aa0a6" font-size="12" text-anchor="middle">Drag, resize, snap, maximize — a normal window while you need it</text>
  </g>
</svg>
