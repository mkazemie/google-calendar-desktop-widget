<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a6c"/><stop offset="0.6" stop-color="#2d1e5f"/><stop offset="1" stop-color="#0f3057"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" rx="16" fill="url(#mbg)"/>
  <circle cx="180" cy="120" r="140" fill="#4facfe" opacity="0.10"/>
  <circle cx="1050" cy="360" r="120" fill="#9d50bb" opacity="0.12"/>

  <!-- desktop icons: one outside the window, two UNDER it (visible in widget mode) -->
  <g>
    <rect x="80" y="120" width="52" height="52" rx="10" fill="#ffffff" opacity="0.16"/>
    <text x="106" y="192" fill="#ffffff" opacity="0.55" font-size="11" text-anchor="middle">Projects</text>
    <rect x="380" y="130" width="48" height="48" rx="9" fill="#f6bf26" opacity="0.85"/>
    <text x="404" y="198" fill="#ffffff" opacity="0.7" font-size="11" text-anchor="middle">Work</text>
    <rect x="380" y="230" width="48" height="48" rx="9" fill="#4facfe" opacity="0.85"/>
    <text x="404" y="298" fill="#ffffff" opacity="0.7" font-size="11" text-anchor="middle">Media</text>
  </g>

  <!-- window shadow (stronger when interactive) -->
  <rect x="338" y="56" width="700" height="332" rx="12" fill="#000000">
    <animate attributeName="opacity" values="0.40;0.40;0.12;0.12;0.40;0.40" keyTimes="0;0.06;0.14;0.55;0.63;1" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- title bar (always solid, always clickable) -->
  <rect x="330" y="48" width="700" height="34" rx="8" fill="#202124"/>
  <rect x="330" y="70" width="700" height="12" fill="#202124"/>
  <rect x="344" y="57" width="16" height="16" rx="4" fill="#1a73e8"/>
  <rect x="347" y="60" width="10" height="3" rx="1" fill="#ffffff"/>
  <rect x="347" y="65" width="10" height="6" rx="1" fill="#ffffff" opacity="0.85"/>
  <text x="370" y="70" fill="#e8eaed" font-size="13">Google Calendar</text>

  <!-- mouse toggle button: gray in interactive, blue in widget mode -->
  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.06;0.12;0.56;0.63;1" dur="8s" repeatCount="indefinite"/>
    <circle cx="975" cy="66" r="3.5" fill="#e8eaed"/>
    <path d="M971 60 q4 -4 8 0" stroke="#e8eaed" stroke-width="1.6" fill="none"/>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.06;0.12;0.56;0.63;1" dur="8s" repeatCount="indefinite"/>
    <circle cx="975" cy="66" r="3.5" fill="#8ab4f8"/>
    <path d="M971 60 q4 -4 8 0" stroke="#8ab4f8" stroke-width="1.6" fill="none"/>
  </g>
  <g stroke="#e8eaed" stroke-width="1.8" opacity="0.9">
    <line x1="1002" y1="61" x2="1018" y2="61"/>
    <line x1="1002" y1="66" x2="1018" y2="66"/>
    <line x1="1002" y1="71" x2="1018" y2="71"/>
  </g>

  <!-- calendar body: fades between solid (interactive) and ghost (widget) -->
  <g opacity="0.97">
    <animate attributeName="opacity" values="0.97;0.97;0.42;0.42;0.97;0.97" keyTimes="0;0.06;0.14;0.55;0.63;1" dur="8s" repeatCount="indefinite"/>
    <rect x="330" y="82" width="700" height="298" fill="#ffffff"/>
    <g stroke="#dadce0" stroke-width="1">
      <line x1="330" y1="132" x2="1030" y2="132"/><line x1="330" y1="192" x2="1030" y2="192"/>
      <line x1="330" y1="252" x2="1030" y2="252"/><line x1="330" y1="312" x2="1030" y2="312"/>
      <line x1="470" y1="82" x2="470" y2="380"/><line x1="610" y1="82" x2="610" y2="380"/>
      <line x1="750" y1="82" x2="750" y2="380"/><line x1="890" y1="82" x2="890" y2="380"/>
    </g>
    <rect x="480" y="100" width="120" height="42" rx="6" fill="#1a73e8"/>
    <text x="490" y="118" fill="#ffffff" font-size="11">Team sync</text>
    <text x="490" y="132" fill="#ffffff" font-size="10" opacity="0.8">9:00 – 9:45</text>
    <rect x="620" y="150" width="120" height="66" rx="6" fill="#0b8043"/>
    <text x="630" y="168" fill="#ffffff" font-size="11">Deep work</text>
    <text x="630" y="182" fill="#ffffff" font-size="10" opacity="0.8">10:00 – 12:00</text>
    <rect x="760" y="210" width="120" height="42" rx="6" fill="#f4511e"/>
    <text x="770" y="228" fill="#ffffff" font-size="11">Lunch w/ Sara</text>
    <rect x="900" y="130" width="118" height="54" rx="6" fill="#8e24aa"/>
    <text x="910" y="148" fill="#ffffff" font-size="11">Design review</text>
    <line x1="610" y1="270" x2="750" y2="270" stroke="#ea4335" stroke-width="2.5"/>
    <circle cx="610" cy="270" r="5" fill="#ea4335"/>
  </g>

  <!-- click ripples on the toggle button -->
  <circle cx="975" cy="65" r="3" fill="none" stroke="#8ab4f8" stroke-width="2.5" opacity="0">
    <animate attributeName="r" values="3;3;20;20" keyTimes="0;0.06;0.12;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.06;0.07;0.12;1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="975" cy="65" r="3" fill="none" stroke="#8ab4f8" stroke-width="2.5" opacity="0">
    <animate attributeName="r" values="3;3;20;20" keyTimes="0;0.55;0.61;1" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.55;0.56;0.61;1" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- cursor resting on the toggle button -->
  <g transform="translate(976 66)">
    <path d="M0 0 L0 20 L5.5 15 L9 24 L13 22 L9.5 13 L16.5 13 Z" fill="#ffffff" stroke="#3c4043" stroke-width="1.3"/>
  </g>

  <!-- mode labels (crossfade) -->
  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.06;0.12;0.56;0.63;1" dur="8s" repeatCount="indefinite"/>
    <rect x="470" y="392" width="420" height="4" rx="2" fill="#8ab4f8" opacity="0"/>
    <text x="680" y="410" fill="#ffffff" font-size="14" text-anchor="middle" font-weight="600">Interactive mode — plan, edit, drag events like a normal window</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.06;0.12;0.56;0.63;1" dur="8s" repeatCount="indefinite"/>
    <text x="680" y="410" fill="#c8d0e0" font-size="14" text-anchor="middle" font-weight="600">Widget mode — transparent, click-through, pinned under every window</text>
  </g>
</svg>
