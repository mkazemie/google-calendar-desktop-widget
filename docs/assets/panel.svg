<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a6c"/><stop offset="0.6" stop-color="#2d1e5f"/><stop offset="1" stop-color="#0f3057"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" rx="16" fill="url(#pbg)"/>
  <circle cx="220" cy="150" r="150" fill="#4facfe" opacity="0.12"/>
  <circle cx="1000" cy="430" r="130" fill="#9d50bb" opacity="0.12"/>

  <!-- desktop icons under the calendar -->
  <g>
    <rect x="70" y="100" width="48" height="48" rx="9" fill="#f6bf26" opacity="0.8"/>
    <text x="94" y="168" fill="#ffffff" opacity="0.6" font-size="11" text-anchor="middle">Work</text>
    <rect x="70" y="200" width="48" height="48" rx="9" fill="#4facfe" opacity="0.8"/>
    <text x="94" y="268" fill="#ffffff" opacity="0.6" font-size="11" text-anchor="middle">Media</text>
  </g>

  <!-- calendar window: opacity follows the slider -->
  <rect x="40" y="28" width="1120" height="30" rx="8" fill="#202124" opacity="0.96"/>
  <rect x="40" y="46" width="1120" height="12" fill="#202124" opacity="0.96"/>
  <rect x="52" y="35" width="15" height="15" rx="4" fill="#1a73e8"/>
  <text x="76" y="49" fill="#e8eaed" font-size="12">Google Calendar — widget mode</text>
  <circle cx="1112" cy="43" r="3" fill="#8ab4f8"/>
  <path d="M1108 38 q4 -3.6 8 0" stroke="#8ab4f8" stroke-width="1.5" fill="none"/>
  <g stroke="#e8eaed" stroke-width="1.6" opacity="0.9">
    <line x1="1132" y1="39" x2="1146" y2="39"/><line x1="1132" y1="43" x2="1146" y2="43"/><line x1="1132" y1="47" x2="1146" y2="47"/>
  </g>

  <g opacity="0.88">
    <animate attributeName="opacity" values="0.88;0.88;0.38;0.38;0.88;0.88" keyTimes="0;0.15;0.35;0.62;0.85;1" dur="10s" repeatCount="indefinite"/>
    <rect x="40" y="58" width="1120" height="454" fill="#ffffff"/>
    <g stroke="#dadce0" stroke-width="1">
      <line x1="40" y1="134" x2="1160" y2="134"/><line x1="40" y1="210" x2="1160" y2="210"/>
      <line x1="40" y1="286" x2="1160" y2="286"/><line x1="40" y1="362" x2="1160" y2="362"/>
      <line x1="40" y1="438" x2="1160" y2="438"/>
      <line x1="264" y1="58" x2="264" y2="512"/><line x1="488" y1="58" x2="488" y2="512"/>
      <line x1="712" y1="58" x2="712" y2="512"/><line x1="936" y1="58" x2="936" y2="512"/>
    </g>
    <rect x="60" y="80" width="180" height="46" rx="6" fill="#1a73e8"/>
    <text x="70" y="98" fill="#ffffff" font-size="11">Team sync · 9:00</text>
    <rect x="284" y="150" width="180" height="70" rx="6" fill="#0b8043"/>
    <text x="294" y="168" fill="#ffffff" font-size="11">Deep work · 10:00</text>
    <rect x="284" y="380" width="180" height="46" rx="6" fill="#f28b82"/>
    <text x="294" y="398" fill="#3c4043" font-size="11">Therapy · 12:00</text>
    <rect x="956" y="110" width="180" height="54" rx="6" fill="#8e24aa"/>
    <text x="966" y="128" fill="#ffffff" font-size="11">Design review · 9:30</text>
    <rect x="956" y="300" width="180" height="60" rx="6" fill="#f4511e"/>
    <text x="966" y="318" fill="#ffffff" font-size="11">Chest + Biceps · 20:00</text>
    <rect x="732" y="230" width="180" height="46" rx="6" fill="#f6bf26"/>
    <text x="742" y="248" fill="#3c4043" font-size="11">Networking · 18:45</text>
    <line x1="488" y1="330" x2="712" y2="330" stroke="#ea4335" stroke-width="2.5"/>
    <circle cx="488" cy="330" r="5" fill="#ea4335"/>
  </g>

  <!-- control panel dialog (stays solid while the calendar fades) -->
  <g>
    <rect x="456" y="116" width="300" height="330" rx="10" fill="#000000" opacity="0.4"/>
    <rect x="450" y="110" width="300" height="330" rx="10" fill="#1d1f26" stroke="#33363e" stroke-width="1"/>
    <!-- header -->
    <rect x="464" y="120" width="14" height="14" rx="3" fill="#1a73e8"/>
    <text x="486" y="132" fill="#e8eaed" font-size="11" font-weight="600">Google Calendar Desktop Widget</text>
    <g stroke="#9aa0a6" stroke-width="1.4">
      <line x1="730" y1="122" x2="740" y2="132"/><line x1="740" y1="122" x2="730" y2="132"/>
    </g>

    <!-- transparency -->
    <text x="468" y="166" fill="#9aa0a6" font-size="10" letter-spacing="1.5">TRANSPARENCY</text>
    <text x="732" y="166" fill="#8ab4f8" font-size="11" text-anchor="end" font-weight="600" opacity="1">15%
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.18;0.28;0.68;0.82;1" dur="10s" repeatCount="indefinite"/>
    </text>
    <text x="732" y="166" fill="#8ab4f8" font-size="11" text-anchor="end" font-weight="600" opacity="0">60%
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.35;0.62;0.75;1" dur="10s" repeatCount="indefinite"/>
    </text>
    <rect x="468" y="180" width="264" height="4" rx="2" fill="#3a3d45"/>
    <rect x="468" y="180" width="40" height="4" rx="2" fill="#1a73e8">
      <animate attributeName="width" values="40;40;158;158;40;40" keyTimes="0;0.15;0.35;0.62;0.85;1" dur="10s" repeatCount="indefinite"/>
    </rect>
    <circle cx="508" cy="182" r="7" fill="#8ab4f8" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="cx" values="508;508;626;626;508;508" keyTimes="0;0.15;0.35;0.62;0.85;1" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- hover panel -->
    <text x="468" y="222" fill="#9aa0a6" font-size="10" letter-spacing="1.5">HOVER PANEL</text>
    <rect x="468" y="234" width="12" height="12" rx="3" fill="none" stroke="#7a7f88" stroke-width="1.3"/>
    <text x="488" y="245" fill="#c9ccd2" font-size="11">Show hover panel in a screen corner</text>
    <rect x="468" y="258" width="264" height="26" rx="5" fill="#14151a" stroke="#33363e" stroke-width="1"/>
    <text x="478" y="275" fill="#9aa0a6" font-size="11">Bottom right</text>
    <path d="M716 268 l5 6 5 -6" stroke="#9aa0a6" stroke-width="1.4" fill="none"/>

    <!-- start with windows -->
    <rect x="468" y="300" width="12" height="12" rx="3" fill="#1a73e8"/>
    <path d="M470.5 306 l3 3.5 5 -6" stroke="#ffffff" stroke-width="1.6" fill="none"/>
    <text x="488" y="311" fill="#e8eaed" font-size="11">Start with Windows</text>

    <!-- tip -->
    <text x="468" y="331" fill="#8a8f98" font-size="9.5">Tip: for a dark widget, enable dark mode inside</text>
    <text x="468" y="344" fill="#8a8f98" font-size="9.5">Google Calendar's own settings (gear icon).</text>

    <!-- support -->
    <rect x="468" y="356" width="264" height="28" rx="6" fill="none" stroke="#f28b82" stroke-width="1.2" opacity="0.9"/>
    <text x="600" y="374" fill="#f28b82" font-size="11" text-anchor="middle">♥  Support development (PayPal)</text>

    <!-- bottom buttons -->
    <rect x="468" y="396" width="127" height="28" rx="6" fill="#2a2d35"/>
    <text x="531" y="414" fill="#e8eaed" font-size="11" text-anchor="middle">Exit widget</text>
    <rect x="605" y="396" width="127" height="28" rx="6" fill="#2a2d35"/>
    <text x="668" y="414" fill="#e8eaed" font-size="11" text-anchor="middle">Sign out</text>
  </g>

  <!-- cursor dragging the slider thumb -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="510 186; 510 186; 628 186; 628 186; 510 186; 510 186"
      keyTimes="0;0.15;0.35;0.62;0.85;1" dur="10s" repeatCount="indefinite"/>
    <path d="M0 0 L0 20 L5.5 15 L9 24 L13 22 L9.5 13 L16.5 13 Z" fill="#ffffff" stroke="#3c4043" stroke-width="1.3"/>
  </g>

  <!-- caption -->
  <rect x="360" y="522" width="480" height="32" rx="16" fill="#202124" opacity="0.92"/>
  <text x="600" y="543" fill="#e8eaed" font-size="14" text-anchor="middle">One slider — from solid window to a ghost on your wallpaper</text>
</svg>
